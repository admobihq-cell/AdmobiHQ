name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master
    types: [opened, synchronize, reopened]

env:
  TURBO_UI: false
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Enable Corepack (if using pnpm/yarn in monorepo)
        run: corepack enable
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (safe mode)
        run: cd apps/web && npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (CI-safe only)
        run: npm run build
