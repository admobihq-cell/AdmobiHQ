name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master
    types: [opened, synchronize, reopened]

env:
  TURBO_UI: false
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL != '' && secrets.NEXT_PUBLIC_SERVER_URL || 'https://admobihq.com' }}
      PAYLOAD_DATABASE_URL: ${{ secrets.PAYLOAD_DATABASE_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      API_KEY_PEXELS: ${{ secrets.API_KEY_PEXELS }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      TEST_RECIPIENT_EMAIL: ${{ secrets.TEST_RECIPIENT_EMAIL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_OPS_URL: ${{ secrets.NEXT_PUBLIC_OPS_URL != '' && secrets.NEXT_PUBLIC_OPS_URL || 'https://ops.admobihq.com' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL != '' && secrets.NEXT_PUBLIC_APP_URL || 'https://app.admobihq.com' }}
      NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL != '' && secrets.NEXT_PUBLIC_WEB_URL || 'https://admobihq.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Check database secrets
        id: db_secrets
        run: |
          if [ -n "${DATABASE_URL}" ] && [ -n "${PAYLOAD_SECRET}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Database secrets present — CMS bootstrap enabled."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL or PAYLOAD_SECRET is not set. Skipping CMS bootstrap; lint, typecheck, and build will still run. Add secrets under Settings → Secrets and variables → Actions for full /blog and /help static generation."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (safe mode)
        run: cd apps/web && npx prisma generate

      - name: Bootstrap CMS (migrate + seed)
        if: ${{ steps.db_secrets.outputs.available == 'true' && vars.SKIP_CMS_BOOTSTRAP != 'true' }}
        run: npm run cms:bootstrap:ci -w web

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (CI-safe only)
        run: npm run build
