version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    ignore:
      # Stay on Zod 3 until schemas + @hookform/resolvers are migrated (see lead-schemas.ts).
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 / ESLint 10 need dedicated migration PRs, not grouped bumps.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Pinned to 0.34.5 across the workspace; hold off on 0.35+ for now.
      - dependency-name: "sharp"
        versions: [">=0.35.0"]
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
    
